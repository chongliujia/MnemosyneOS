name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run Go tests
        run: make test-go

  harness:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lane: [smoke, regression]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run harness lane
        env:
          HARNESS_OUT_ROOT: ${{ runner.temp }}/mnemosyne-harness-${{ matrix.lane }}
        run: ./scripts/ci-harness.sh "${{ matrix.lane }}"

      - name: Upload harness reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-${{ matrix.lane }}
          path: ${{ runner.temp }}/mnemosyne-harness-${{ matrix.lane }}
